<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💌 Valentine Letter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Scanline CRT overlay -->
  <div id="scanlines"></div>

  <!-- Custom cursor -->
  <div id="custom-cursor"></div>

  <!-- Floating hearts background -->
  <div id="bg-particles"></div>

  <!-- ═══════════════════════════════════════
       SCENE 1: Boot / Loading sequence
       ═══════════════════════════════════════ -->
  <div class="scene" id="scene-boot">
    <div id="boot-text"></div>
    <div class="boot-skip">[ CLICK ANYWHERE TO SKIP ]</div>
  </div>

  <!-- ═══════════════════════════════════════
       SCENE 2: Envelope
       ═══════════════════════════════════════ -->
  <div class="scene" id="scene-envelope">
    <div class="env-card">
      <img src="envelope.png" alt="Envelope" id="envelope-img" />
      <div class="env-label">✉ A Letter For You ✉</div>
      <div class="env-hint">[ CLICK TO OPEN ]</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       SCENE 3: The Letter / Question
       ═══════════════════════════════════════ -->
  <div class="scene" id="scene-letter">
    <div class="letter-window" id="letter-window">

      <h1 id="letter-title"></h1>

      <img src="cat_heart.gif" id="letter-cat" alt="pixel cat" />

      <!-- Love Meter -->
      <div id="progress-area">
        <div id="progress-label-row">
          <span>LOVE METER</span>
          <span id="progress-pct">0%</span>
        </div>
        <div id="progress-track">
          <div id="progress-fill"></div>
        </div>
      </div>

      <!-- YES / NO buttons -->
      <div class="btns" id="btns">
        <button class="pixel-btn" id="yes-btn" aria-label="Yes">
          <img src="yes.png" alt="YES" />
        </button>
        <div id="no-wrapper">
          <button class="pixel-btn" id="no-btn" aria-label="No">
            <img src="no.png" alt="NO" />
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════
       SCENE 4: Accepted / Celebration
       ═══════════════════════════════════════ -->
  <div class="scene" id="scene-accepted">
    <div class="accepted-window">

      <h1 id="accepted-title">YIPPEEEE!! 🎉</h1>

      <img src="cat_dance.gif" id="accepted-cat" alt="dancing cat" />

      <div id="accepted-text">
        <div class="date-box">
          <div class="date-line">📍 Meow Restaurant &nbsp;·&nbsp; 7:00 PM</div>
          <div class="date-line">🎀 Dress fancy &nbsp;·&nbsp; Bring your smile</div>
          <div class="date-line">🐾 Cat attendance: confirmed</div>
          <div class="name-line">See you there, Ali HOUSSENY! 💕</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════
       No-click shame badge
       ═══════════════════════════════════════ -->
  <div id="badge"></div>

  <!-- ═══════════════════════════════════════
       Escape popup
       ═══════════════════════════════════════ -->
  <div id="popup">
    <div class="popup-box">
      <div id="popup-cat">😾</div>
      <p id="popup-msg"></p>
      <div class="popup-ok-wrap">
        <button id="popup-ok">OK FINE 💘</button>
      </div>
    </div>
  </div>

  <!-- Compiled from script.ts -->
  <!-- Run: tsc script.ts --target ES2017 --lib dom,es2017 --strict --skipLibCheck -->
  <script src="script.js"></script>
</body>
</html>
